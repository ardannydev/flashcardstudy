<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Masuk atau daftar akun FlashCardStudy untuk menyimpan flashcard kamu.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0b2e">
<title>Masuk — FlashCardStudy</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme login-page">

  <main class="auth-wrap">
    <div class="auth-brand">
      <span class="logo">FlashCardStudy</span>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="tabLogin">Masuk</button>
        <button type="button" class="auth-tab" id="tabRegister">Daftar</button>
      </div>

      <div id="authError" class="auth-error"></div>

      <!-- Form Masuk -->
      <form id="loginForm">
        <h1 class="auth-title">Masuk ke akun kamu</h1>
        <p class="auth-sub">Semua set flashcard kamu tersimpan aman di akunmu.</p>
        <div class="auth-field">
          <label for="loginUsername">Username</label>
          <input id="loginUsername" autocomplete="username" placeholder="Masukkan username" required>
        </div>
        <div class="auth-field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="auth-submit" id="loginBtn">Masuk</button>
      </form>

      <!-- Form Daftar -->
      <form id="registerForm" style="display:none">
        <h1 class="auth-title">Buat akun baru</h1>
        <p class="auth-sub">Data akan otomatis tersimpan ke akunmu di server.</p>
        <div class="auth-field">
          <label for="regUsername">Username</label>
          <input id="regUsername" autocomplete="username" placeholder="Minimal 3 karakter" required>
        </div>
        <div class="auth-field">
          <label for="regPassword">Password</label>
          <input id="regPassword" type="password" autocomplete="new-password" placeholder="Minimal 6 karakter" required>
        </div>
        <div class="auth-field">
          <label for="regPassword2">Ulangi Password</label>
          <input id="regPassword2" type="password" autocomplete="new-password" placeholder="Ulangi password" required>
        </div>
        <button type="submit" class="auth-submit" id="registerBtn">Daftar</button>
      </form>

    </div>
  </main>

<script src="app.js"></script>
<script>
// kalau sudah login, langsung ke beranda
if(getToken()){
  navigateTo('index.html', { replace: true });
}

const tabLogin = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const authError = document.getElementById('authError');

function showTab(which){
  authError.classList.remove('show');
  authError.textContent = '';
  const isLogin = which === 'login';
  tabLogin.classList.toggle('active', isLogin);
  tabRegister.classList.toggle('active', !isLogin);
  loginForm.style.display = isLogin ? 'block' : 'none';
  registerForm.style.display = isLogin ? 'none' : 'block';
}
tabLogin.addEventListener('click', () => showTab('login'));
tabRegister.addEventListener('click', () => showTab('register'));

function showError(msg){
  authError.textContent = msg;
  authError.classList.add('show');
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!username || !password){ showError('Username dan password wajib diisi.'); return; }

  btn.disabled = true; btn.textContent = 'Memproses...';

  if(isLocalMode()){
    setAuth('local_dev_token', username);
    navigateTo('index.html');
    btn.disabled = false; btn.textContent = 'Masuk';
    return;
  }

  try{
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if(!res.ok){ showError(data.error || 'Gagal masuk.'); return; }
    setAuth(data.token, data.username);
    await syncSetsFromServer();
    navigateTo('index.html');
  }catch(err){
    showError('Tidak bisa terhubung ke server. Coba lagi.');
  }finally{
    btn.disabled = false; btn.textContent = 'Masuk';
  }
});

registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const password2 = document.getElementById('regPassword2').value;

  if(!username || !password || !password2){ showError('Semua kolom wajib diisi.'); return; }
  if(password !== password2){ showError('Password dan ulangi password tidak sama.'); return; }

  btn.disabled = true; btn.textContent = 'Memproses...';

  if(isLocalMode()){
    setAuth('local_dev_token', username);
    navigateTo('index.html');
    btn.disabled = false; btn.textContent = 'Daftar';
    return;
  }

  try{
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if(!res.ok){ showError(data.error || 'Gagal mendaftar.'); return; }
    setAuth(data.token, data.username);
    navigateTo('index.html');
  }catch(err){
    showError('Tidak bisa terhubung ke server. Coba lagi.');
  }finally{
    btn.disabled = false; btn.textContent = 'Daftar';
  }
});
</script>
</body>
</html>
