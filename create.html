<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Buat atau edit set flashcard baru di FlashCardStudy.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1426">
<title>Buat Set — FlashCardStudy</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

  <header class="nh nh-nav-always">
    <div class="nh-inner">
      <div class="nh-bar">
        <a href="index.html" class="nh-logo">FlashCardStudy</a>
        <nav class="nh-nav-desktop">
          <div class="nh-skew-wrap">
            <a href="index.html" class="nh-link" draggable="false">Beranda</a>
            <a href="sets.html" class="nh-link" draggable="false">Set</a>
            <a href="create.html" class="nh-link active" draggable="false" id="leaveBtn">Buat</a>
            <span class="nh-nav-dot" id="navDot"></span>
          </div>
        </nav>
        <div class="nh-actions">
          <a href="profile.html" class="nh-profile-btn" draggable="false" aria-label="Profil" id="navProfileBtn">
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="cwrap">
    <input aria-label="Judul set" class="cfield-box" id="title" placeholder="Judul">
    <textarea aria-label="Deskripsi set" class="cfield-box" id="desc" placeholder="Tambahkan deskripsi..." rows="1"></textarea>

    <div class="ctoolbar">
      <button type="button" class="ibtn ibtn-outline" id="importToggle" aria-expanded="false" aria-controls="importBox">+ Masukkan</button>
      <button type="button" class="ibtn ibtn-primary" onclick="handleSave(false)">Buat</button>
    </div>

    <div class="cimport-box" id="importBox">
      <div class="cimport-grid">
        <textarea id="bulkText" placeholder="こうきょう → publik&#10;しせつ → fasilitas&#10;としょかん → perpustakaan"></textarea>
        <button class="cbtn cbtn-primary" onclick="parseBulk()">Proses</button>
      </div>
    </div>

    <div id="rows"></div>

    <div class="caddcard-wrap">
      <button type="button" class="caddcard-btn" onclick="addRow()" aria-label="Tambahkan kartu">Tambahkan kartu</button>
    </div>
  </main>

  <footer class="site-footer">
    <p>FlashCardStudy &mdash; oleh <strong>Ardwanny</strong></p>
  </footer>

  <script src="app.js"></script>
<script>
let rows = []; // {id, term, def}
let editingId = qs('id');
let _saving = false;

function addRow(term='', def=''){
  rows.push({id: uid('row'), term, def});
  renderRows();
}
function removeRow(rid){
  rows = rows.filter(r => r.id !== rid);
  window.rows = rows;
  renderRows();
}
function moveRow(rid, dir){
  const i = rows.findIndex(r => r.id === rid);
  const j = i + dir;
  if(j < 0 || j >= rows.length) return;
  [rows[i], rows[j]] = [rows[j], rows[i]];
  renderRows();
}
let dragRowId = null;
function onDragStart(e, rid){
  dragRowId = rid;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.crow').forEach(el => el.classList.remove('drag-over'));
  dragRowId = null;
}
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, targetRid){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragRowId || dragRowId === targetRid) return;
  const fromIdx = rows.findIndex(r => r.id === dragRowId);
  const toIdx = rows.findIndex(r => r.id === targetRid);
  const [moved] = rows.splice(fromIdx, 1);
  rows.splice(toIdx, 0, moved);
  renderRows();
}

/* ---- Touch-based drag and drop for mobile ---- */
let touchDrag = {
  active: false,
  rowId: null,
  clone: null,
  startY: 0,
  startIdx: -1,
  currentOverIdx: -1
};

function onTouchStart(e, rid){
  const touch = e.touches[0];
  const row = e.currentTarget.closest('.crow');
  if(!row) return;

  const rect = row.getBoundingClientRect();
  touchDrag.active = true;
  touchDrag.rowId = rid;
  touchDrag.startY = touch.clientY;
  touchDrag.startIdx = rows.findIndex(r => r.id === rid);
  touchDrag.currentOverIdx = touchDrag.startIdx;

  const clone = row.cloneNode(true);
  clone.classList.add('crow-drag-clone');
  clone.style.position = 'fixed';
  clone.style.left = rect.left + 'px';
  clone.style.top = rect.top + 'px';
  clone.style.width = rect.width + 'px';
  clone.style.zIndex = '9999';
  clone.style.pointerEvents = 'none';
  clone.style.opacity = '0.92';
  clone.style.transform = 'scale(1.03)';
  clone.style.boxShadow = '0 12px 40px rgba(80,108,255,.35)';
  clone.style.transition = 'none';
  document.body.appendChild(clone);
  touchDrag.clone = clone;

  row.classList.add('dragging');
  e.preventDefault();
}

function onTouchMove(e){
  if(!touchDrag.active) return;
  const touch = e.touches[0];
  const dy = touch.clientY - touchDrag.startY;
  if(touchDrag.clone){
    const row = document.querySelector(`.crow[data-row-id="${touchDrag.rowId}"]`);
    const rect = row.getBoundingClientRect();
    touchDrag.clone.style.top = (rect.top + dy) + 'px';
  }

  const rows_els = document.querySelectorAll('.crow');
  rows_els.forEach(el => el.classList.remove('drag-over'));
  let overIdx = touchDrag.startIdx;
  rows_els.forEach((el, i) => {
    const rect = el.getBoundingClientRect();
    if(touch.clientY > rect.top && touch.clientY < rect.bottom){
      overIdx = i;
      if(i !== touchDrag.startIdx) el.classList.add('drag-over');
    }
  });
  touchDrag.currentOverIdx = overIdx;
  e.preventDefault();
}

function onTouchEnd(){
  if(!touchDrag.active) return;
  touchDrag.active = false;

  if(touchDrag.clone) touchDrag.clone.remove();
  document.querySelectorAll('.crow').forEach(el => {
    el.classList.remove('dragging');
    el.classList.remove('drag-over');
  });

  const fromIdx = touchDrag.startIdx;
  const toIdx = touchDrag.currentOverIdx;
  if(fromIdx !== toIdx && fromIdx >= 0 && toIdx >= 0){
    const [moved] = rows.splice(fromIdx, 1);
    rows.splice(toIdx, 0, moved);
    renderRows();
  }
  touchDrag.rowId = null;
  touchDrag.clone = null;
  touchDrag.startIdx = -1;
  touchDrag.currentOverIdx = -1;
}

document.addEventListener('touchmove', onTouchMove, {passive:false});
document.addEventListener('touchend', onTouchEnd);
function renderRows(){
  const wrap = document.getElementById('rows');
  if(rows.length === 0){
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = rows.map((r,i) => {
    const rid = escapeHtml(r.id);
    return `
    <div class="crow" draggable="true"
      data-row-id="${rid}"
      ondragstart="onDragStart(event,this.dataset.rowId)"
      ondragend="onDragEnd(event)"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,this.dataset.rowId)">
      <div class="crow-top">
        <div class="crow-num">${i+1}</div>
        <div class="crow-tools">
          <span class="crow-handle" title="Seret untuk geser urutan"
            ontouchstart="onTouchStart(event,this.closest('.crow').dataset.rowId)">⠿</span>
          <button type="button" title="Hapus kartu" onclick="removeRow(this.closest('.crow').dataset.rowId)" aria-label="Hapus kartu ${i+1}">🗑</button>
        </div>
      </div>
      <div class="crow-body">
        <div class="crow-inputs">
          <div class="cinput-group">
            <input aria-label="Istilah ${i+1}" placeholder="" value="${escapeHtml(r.term)}"
              oninput="rows.find(x=>x.id===this.closest('.crow').dataset.rowId).term=this.value">
            <label>Istilah</label>
          </div>
          <div class="cinput-group">
            <input aria-label="Definisi ${i+1}" placeholder="" value="${escapeHtml(r.def)}"
              oninput="rows.find(x=>x.id===this.closest('.crow').dataset.rowId).def=this.value">
            <label>Definisi</label>
          </div>
        </div>
      </div>
    </div>
  `}).join('');
}

// Keep inline mobile handlers working when this page is loaded by the SPA router.
window.rows = rows;
Object.assign(window, { addRow, removeRow, moveRow, onDragStart, onDragEnd, onDragOver, onDragLeave, onDrop, onTouchStart, parseBulk, handleSave });

const importToggle = document.getElementById('importToggle');
if (importToggle) {
  importToggle.addEventListener('click', () => {
    const box = document.getElementById('importBox');
    if (!box) return;
    const open = box.classList.toggle('open');
    importToggle.setAttribute('aria-expanded', String(open));
  });
}

const HAS_JP = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF]/;
const JP_ONLY = /[^\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF\u3005\u3006\u3007\u3031-\u303B\u30FC\u30FB\u3001\u3002\s]/g;
const PARENS = /\s*[（(][^）)]*[）)]\s*/g;

function cleanTerm(raw){
  return raw.replace(PARENS, ' ').replace(JP_ONLY, '').replace(/\s+/g, ' ').trim();
}

function parseCSV(text){
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const parsed = [];
  const failedLines = [];

  lines.forEach(line => {
    const idx = line.indexOf('→');
    if(idx === -1){ failedLines.push(line); return; }
    const rawTerm = line.slice(0, idx).trim();
    const def = line.slice(idx + 1).trim();
    if(!rawTerm || !def){ failedLines.push(line); return; }
    const term = cleanTerm(rawTerm);
    if(!term || !HAS_JP.test(term)){ failedLines.push(line); return; }
    parsed.push({id: uid('row'), term, def: def.replace(/\s+/g, ' ').trim()});
  });

  return { parsed, failedLines };
}

function parseBulk(){
  const raw = document.getElementById('bulkText').value;
  const { parsed, failedLines } = parseCSV(raw);

  if(parsed.length === 0){
    createNotification('Tidak ada baris yang berhasil dibaca. Pastikan tiap baris berformat "kotoba [pemisah] arti" atau CSV/TSV.', 'error');
    return;
  }
  // filter panjang
  const valid = [];
  const skipped = [];
  parsed.forEach(p => {
    if(p.term.length > 50 || p.def.length > 150) skipped.push(p);
    else valid.push(p);
  });

  rows = rows.filter(r => r.term.trim() || r.def.trim());
  rows = rows.concat(valid);
  document.getElementById('bulkText').value = '';
  renderRows();
  setTimeout(() => {
    const el = document.querySelector('.crow:last-child');
    if(el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 50);

  const skipCount = skipped.length + failedLines.length;
  if(skipCount > 0 && valid.length > 0){
    createNotification(`${valid.length} kotoba ditambahkan. ${skipCount} baris dilewati (tidak sesuai format).`, 'info');
  } else if(valid.length === 0){
    createNotification('Tidak ada kotoba yang berhasil diproses. Format: "kotoba [→/-/:] arti"', 'error');
  } else {
    createNotification(`${valid.length} kotoba berhasil ditambahkan.`, 'success');
  }
}

async function handleSave(andPractice){
  const title = document.getElementById('title').value.trim();
  const desc = document.getElementById('desc').value.trim();
  const cleanTerms = rows
    .map(r => ({id: r.id, term: r.term.trim(), def: r.def.trim()}))
    .filter(r => r.term && r.def);

  if(!title){ createNotification('Judul set wajib diisi.', 'error'); return; }
  if(cleanTerms.length === 0){ createNotification('Tambahkan minimal 1 kotoba beserta artinya.', 'error'); return; }

  const setId = editingId || uid('set');

  // initialize review metadata for each term (SM-2)
  const now = Date.now();
  const termsWithMeta = cleanTerms.map(t => ({
    id: t.id,
    term: t.term,
    def: t.def,
    _review: t._review || {
      reps: 0,
      ease: 2.5,
      interval: 0,
      last: null,
      due: now
    }
  }));

  const set = {
    id: setId,
    title, desc,
    terms: termsWithMeta,
    updatedAt: Date.now()
  };

  const saveBtn = document.querySelector('.ibtn-primary');
  const originalLabel = saveBtn ? saveBtn.textContent : null;
  if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Menyimpan...'; }

  try{
    _saving = true;
    await upsertSet(set);
    sessionStorage.setItem('navInternal','1');
    navigateTo(andPractice ? `learn.html?id=${set.id}` : 'sets.html');
  }catch(e){
    _saving = false;
    createNotification('Gagal menyimpan set ke server. Coba lagi.', 'error');
    if(saveBtn){ saveBtn.disabled = false; saveBtn.textContent = originalLabel; }
  }
}

// muat data jika mode edit
(async function init(){
  if(!requireLogin()) return;
  function applyEditingSet(){
    if(!editingId) return;
    const set = getSet(editingId);
    if(set){
      document.getElementById('title').value = set.title;
      document.getElementById('desc').value = set.desc || '';
      rows = set.terms.map(t => ({id: t.id || uid('row'), term: t.term, def: t.def}));
      window.rows = rows;
    }
  }
  applyEditingSet();
  renderRows();
  if(rows.length === 0) addRow();
  const initialRows = JSON.stringify(rows);

  function hasUnsavedChanges(){
    if(_saving) return false;
    const title = document.getElementById('title').value.trim();
    return title || rows.some(r => r.term.trim() || r.def.trim());
  }

  const leaveBtn = document.getElementById('leaveBtn');
  const leaveHandler = async (e) => {
    if(!hasUnsavedChanges()) return;
    e.preventDefault();
    const confirmed = await showConfirm('Perubahan belum disimpan. Keluar?', {confirmText: 'Keluar', cancelText: 'Batal'});
    if(confirmed){ navigateTo('index.html'); }
  };
  leaveBtn.addEventListener('click', leaveHandler);
  window.__pageCleanup = () => {
    leaveBtn.removeEventListener('click', leaveHandler);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
  };
  
  // Render avatar profil di navbar
  function renderNavAvatar(){
    const btn = document.getElementById('navProfileBtn');
    if(btn && typeof getUserAvatarUrl === 'function'){
      btn.innerHTML = `<img src="${getUserAvatarUrl()}" alt="Avatar">`;
    }
  }
  renderNavAvatar();

  // Tampilkan cache lokal lebih dulu, lalu rapikan jika data server berubah.
  syncSetsFromServer().then(() => {
    if(editingId && JSON.stringify(rows) === initialRows){
      applyEditingSet();
      renderRows();
    }
  });
})();
</script>
<script>
// Internal navigation — no loading, no nav animation
// If coming from internal nav, skip nav animation
if(sessionStorage.getItem('navInternal')){
  document.querySelector('.nh').classList.add('nh-no-anim');
  sessionStorage.removeItem('navInternal');
}
</script>
