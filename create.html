<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Buat atau edit set flashcard baru di FlashCardStudy.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0b2e">
<title>Buat Set — FlashCardStudy</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

  <header class="main-header">
    <div class="header-brand">
      <a href="index.html" class="logo">FlashCardStudy</a>
      <p class="tagline">Buat set flashcard dengan tampilan utama yang lebih rapi.</p>
    </div>
    <div class="header-actions">
      <a class="ibtn ibtn-outline" href="index.html" id="leaveBtn">Beranda</a>
      <button type="button" class="ibtn ibtn-primary" onclick="handleSave(false)">Buat</button>
    </div>
  </header>

  <main class="cwrap">
    <input aria-label="Judul set" class="cfield-box" id="title" placeholder="Judul">
    <textarea aria-label="Deskripsi set" class="cfield-box" id="desc" placeholder="Tambahkan deskripsi..." rows="1"></textarea>

    <div class="ctoolbar">
      <button type="button" class="ibtn ibtn-outline" id="importToggle" aria-expanded="false" aria-controls="importBox">+ Masukkan</button>
    </div>

    <div class="cimport-box" id="importBox">
      <div class="cimport-grid">
        <textarea id="bulkText" placeholder="こうきょう → publik&#10;しせつ → fasilitas&#10;としょかん → perpustakaan"></textarea>
        <button class="cbtn cbtn-primary" onclick="parseBulk()">Proses</button>
      </div>
    </div>

    <div id="rows"></div>

    <div class="caddcard-wrap">
      <button type="button" class="caddcard-btn" onclick="addRow()" aria-label="Tambahkan kartu">Tambahkan kartu</button>
    </div>
  </main>

<script src="app.js"></script>
<script>
let rows = []; // {id, term, def}
let editingId = qs('id');
let _saving = false;

function addRow(term='', def=''){
  rows.push({id: uid('row'), term, def});
  renderRows();
}
function removeRow(rid){
  rows = rows.filter(r => r.id !== rid);
  renderRows();
}
function moveRow(rid, dir){
  const i = rows.findIndex(r => r.id === rid);
  const j = i + dir;
  if(j < 0 || j >= rows.length) return;
  [rows[i], rows[j]] = [rows[j], rows[i]];
  renderRows();
}
let dragRowId = null;
function onDragStart(e, rid){
  dragRowId = rid;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.crow').forEach(el => el.classList.remove('drag-over'));
  dragRowId = null;
}
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, targetRid){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragRowId || dragRowId === targetRid) return;
  const fromIdx = rows.findIndex(r => r.id === dragRowId);
  const toIdx = rows.findIndex(r => r.id === targetRid);
  const [moved] = rows.splice(fromIdx, 1);
  rows.splice(toIdx, 0, moved);
  renderRows();
}
function renderRows(){
  const wrap = document.getElementById('rows');
  if(rows.length === 0){
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = rows.map((r,i) => {
    const rid = escapeHtml(r.id);
    return `
    <div class="crow" draggable="true"
      data-row-id="${rid}"
      ondragstart="onDragStart(event,this.dataset.rowId)"
      ondragend="onDragEnd(event)"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,this.dataset.rowId)">
      <div class="crow-top">
        <div class="crow-num">${i+1}</div>
        <div class="crow-tools">
          <span class="crow-handle" title="Seret untuk geser urutan">⠿</span>
          <button type="button" title="Hapus kartu" onclick="removeRow(this.closest('.crow').dataset.rowId)" aria-label="Hapus kartu ${i+1}">🗑</button>
        </div>
      </div>
      <div class="crow-body">
        <div class="crow-inputs">
          <div class="cinput-group">
            <input aria-label="Istilah ${i+1}" placeholder="" value="${escapeHtml(r.term)}"
              oninput="rows.find(x=>x.id===this.closest('.crow').dataset.rowId).term=this.value">
            <label>Istilah</label>
          </div>
          <div class="cinput-group">
            <input aria-label="Definisi ${i+1}" placeholder="" value="${escapeHtml(r.def)}"
              oninput="rows.find(x=>x.id===this.closest('.crow').dataset.rowId).def=this.value">
            <label>Definisi</label>
          </div>
        </div>
      </div>
    </div>
  `}).join('');
}

const importToggle = document.getElementById('importToggle');
if (importToggle) {
  importToggle.addEventListener('click', () => {
    const box = document.getElementById('importBox');
    if (!box) return;
    const open = box.classList.toggle('open');
    importToggle.setAttribute('aria-expanded', String(open));
  });
}

// urutan pemisah yang dicoba saat mode "Deteksi otomatis"
const AUTO_DELIMS = ['→', '->', '—', ':', '-', '\t', '=', ','];

// pisah satu baris jadi [kotoba, arti] pakai pemisah tertentu, atau null kalau gagal
function splitLine(line, delim){
  const idx = line.indexOf(delim);
  if(idx === -1) return null;
  const term = line.slice(0, idx).trim();
  const def = line.slice(idx + delim.length).trim();
  if(!term || !def) return null;
  return [term, def];
}

function parseCSV(text){
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const parsed = [];
  const failedLines = [];

  lines.forEach(line => {
    // Try CSV-style: "term","def" or term,def
    const csvMatch = line.match(/^"([^"]*)",\s*"([^"]*)"$/);
    if(csvMatch){
      const term = csvMatch[1].trim();
      const def = csvMatch[2].trim();
      if(term && def){
        parsed.push({id: uid('row'), term, def});
        return;
      }
    }
    // Try TSV
    const parts = line.split('\t').map(s => s.trim()).filter(Boolean);
    if(parts.length >= 2){
      parsed.push({id: uid('row'), term: parts[0], def: parts.slice(1).join(' ')});
      return;
    }
    // Try auto-delim
    let result = null;
    for(const d of AUTO_DELIMS){
      result = splitLine(line, d);
      if(result) break;
    }
    if(result){
      parsed.push({id: uid('row'), term: result[0], def: result[1]});
    } else {
      const m = line.split(/\s{2,}|\t+/).filter(Boolean);
      if(m.length >= 2){
        parsed.push({id: uid('row'), term: m[0].trim(), def: m.slice(1).join(' ').trim()});
      } else {
        failedLines.push(line);
      }
    }
  });

  return { parsed, failedLines };
}

function parseBulk(){
  const raw = document.getElementById('bulkText').value;
  const { parsed, failedLines } = parseCSV(raw);

  if(parsed.length === 0){
    createNotification('Tidak ada baris yang berhasil dibaca. Pastikan tiap baris berformat "kotoba [pemisah] arti" atau CSV/TSV.', 'error');
    return;
  }
  // filter panjang
  const valid = [];
  const skipped = [];
  parsed.forEach(p => {
    if(p.term.length > 50 || p.def.length > 150) skipped.push(p);
    else valid.push(p);
  });

  rows = rows.filter(r => r.term.trim() || r.def.trim());
  rows = rows.concat(valid);
  document.getElementById('bulkText').value = '';
  renderRows();

  const skipCount = skipped.length + failedLines.length;
  if(skipCount > 0){
    createNotification(`${valid.length} kotoba berhasil ditambahkan. ${skipCount} baris dilewati.`, 'info');
  } else {
    createNotification(`${valid.length} kotoba berhasil ditambahkan.`, 'success');
  }
}

async function handleSave(andPractice){
  const title = document.getElementById('title').value.trim();
  const desc = document.getElementById('desc').value.trim();
  const cleanTerms = rows
    .map(r => ({id: r.id, term: r.term.trim(), def: r.def.trim()}))
    .filter(r => r.term && r.def);

  if(!title){ createNotification('Judul set wajib diisi.', 'error'); return; }
  if(cleanTerms.length === 0){ createNotification('Tambahkan minimal 1 kotoba beserta artinya.', 'error'); return; }

  const setId = editingId || uid('set');

  // initialize review metadata for each term (SM-2)
  const now = Date.now();
  const termsWithMeta = cleanTerms.map(t => ({
    id: t.id,
    term: t.term,
    def: t.def,
    _review: t._review || {
      reps: 0,
      ease: 2.5,
      interval: 0,
      last: null,
      due: now
    }
  }));

  const set = {
    id: setId,
    title, desc,
    terms: termsWithMeta,
    updatedAt: Date.now()
  };

  const saveBtn = document.querySelector('.ibtn-primary');
  const originalLabel = saveBtn ? saveBtn.textContent : null;
  if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Menyimpan...'; }

  try{
    _saving = true;
    await upsertSet(set); // tunggu sampai benar-benar tersimpan ke server sebelum pindah halaman
    location.href = andPractice ? `learn.html?id=${set.id}` : 'index.html';
  }catch(e){
    _saving = false;
    createNotification('Gagal menyimpan set ke server. Coba lagi.', 'error');
    if(saveBtn){ saveBtn.disabled = false; saveBtn.textContent = originalLabel; }
  }
}

// muat data jika mode edit
(async function init(){
  if(!requireLogin()) return;
  await syncSetsFromServer();
  if(editingId){
    const set = getSet(editingId);
    if(set){
      document.querySelector('.tagline').textContent = 'Edit set';
      document.getElementById('title').value = set.title;
      document.getElementById('desc').value = set.desc || '';
      rows = set.terms.map(t => ({id: t.id || uid('row'), term: t.term, def: t.def}));
    }
  }
  renderRows();
  if(rows.length === 0) addRow();

  function hasUnsavedChanges(){
    if(_saving) return false;
    const title = document.getElementById('title').value.trim();
    return title || rows.some(r => r.term.trim() || r.def.trim());
  }

  document.getElementById('leaveBtn').addEventListener('click', async (e) => {
    if(!hasUnsavedChanges()) return;
    e.preventDefault();
    const confirmed = await showConfirm('Perubahan belum disimpan. Keluar?', {confirmText: 'Keluar', cancelText: 'Batal'});
    if(confirmed) window.location.href = 'index.html';
  });
})();
</script>
</body>
</html>
