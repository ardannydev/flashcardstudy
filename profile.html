<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profil akun FlashCardStudy.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1426">
<title>Profil — FlashCardStudy</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

  <header class="nh nh-nav-always">
    <div class="nh-inner">
      <div class="nh-bar">
        <a href="index.html" class="nh-logo">FlashCardStudy</a>
        <nav class="nh-nav-desktop">
          <div class="nh-skew-wrap">
            <a href="index.html" class="nh-link" draggable="false">Beranda</a>
            <a href="sets.html" class="nh-link" draggable="false">Set</a>
            <a href="create.html" class="nh-link" draggable="false">Buat</a>
            <span class="nh-nav-dot" id="navDot"></span>
          </div>
        </nav>
        <div class="nh-actions">
          <a href="profile.html" class="nh-profile-btn" draggable="false" aria-label="Profil" id="navProfileBtn">
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="profile-wrap">
    <div class="profile-card">
      <div class="profile-avatar" id="profileAvatar">
      </div>
      <h1 class="profile-name" id="profileName">— <span id="devBadge" class="dev-badge" style="display:none">DEV</span></h1>
      <p class="profile-joined" id="profileJoined">Terdaftar: —</p>
    </div>

    <div class="profile-stats">
      <div class="profile-stat">
        <span class="profile-stat-num" id="statSets">0</span>
        <span class="profile-stat-label">Set</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="statCards">0</span>
        <span class="profile-stat-label">Kartu</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="statMastered">0</span>
        <span class="profile-stat-label">Dikuasai</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="statLearning">0</span>
        <span class="profile-stat-label">Diproses</span>
      </div>
    </div>

    <div class="profile-actions">
      <button class="btn btn-outline" onclick="logout()">Keluar</button>
      <button class="btn btn-report" id="reportBtn" onclick="openReportForm()">Laporkan</button>
    </div>

    <div id="devDashboard" class="dev-wrap" style="display:none"></div>
  </main>

  <div class="report-overlay" id="reportOverlay">
    <div class="report-card">
      <h3>Laporkan Masalah / Saran</h3>
      <select id="reportType" class="report-select">
        <option value="bug">Bug / Error</option>
        <option value="feature">Saran Fitur</option>
        <option value="other">Lainnya</option>
      </select>
      <textarea id="reportMessage" class="report-textarea" placeholder="Jelaskan masalah atau saran kamu..." rows="4"></textarea>
      <div class="report-actions">
        <button class="btn btn-ghost" onclick="closeReportForm()">Batal</button>
        <button class="btn btn-primary" onclick="submitReport()">Kirim</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>FlashCardStudy &mdash; oleh <strong>Ardwanny</strong></p>
  </footer>

  <script src="app.js"></script>
<script>
(async function(){
  if(!requireLogin()) return;
  await syncSetsFromServer();

  const username = getCurrentUser() || 'Pengguna';
  document.getElementById('profileName').textContent = username;
  if(isDevUser()) document.getElementById('devBadge').style.display = 'inline';

  // Profile data is cached in app.js during soft navigation.
  try {
    const data = await getUserProfile();
    if(data && data.createdAt) {
      const d = new Date(data.createdAt);
      document.getElementById('profileJoined').textContent = 'Terdaftar: ' + d.toLocaleDateString('id-ID', { year:'numeric', month:'long', day:'numeric' });
    }
  } catch(e) { /* server not available */ }

  // Calculate stats from local sets
  const sets = getSets();
  let totalCards = 0, mastered = 0, learning = 0;
  const now = Date.now();

  sets.forEach(set => {
    if(set.terms) {
      set.terms.forEach(term => {
        totalCards++;
        if(term._review) {
          if(term._review.due && term._review.due <= now) learning++;
          else if(term._review.reps >= 3) mastered++;
          else if(term._review.reps > 0) learning++;
        }
      });
    }
  });

  document.getElementById('statSets').textContent = sets.length;
  document.getElementById('statCards').textContent = totalCards;
  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statLearning').textContent = learning;
  
  // Render avatar profil di navbar dan halaman profil
  function renderAvatars(){
    const navBtn = document.getElementById('navProfileBtn');
    if(navBtn && typeof getUserAvatarUrl === 'function'){
      navBtn.innerHTML = `<img src="${getUserAvatarUrl()}" alt="Avatar">`;
    }
    const profileAvatar = document.getElementById('profileAvatar');
    if(profileAvatar && typeof getUserAvatarUrl === 'function'){
      profileAvatar.innerHTML = `<img src="${getUserAvatarUrl()}" alt="Avatar">`;
    }
  }
  renderAvatars();

  // Render dev dashboard if user is dev
  if(isDevUser()) renderDevDashboard();
})();
</script>
<script>
function openReportForm(){
  document.getElementById('reportOverlay').classList.add('visible');
}
function closeReportForm(){
  document.getElementById('reportOverlay').classList.remove('visible');
}
function submitReport(){
  const type = document.getElementById('reportType').value;
  const message = document.getElementById('reportMessage').value.trim();
  if(!message){ createNotification('Pesan tidak boleh kosong.', 'error'); return; }
  addReport(type, message);
  document.getElementById('reportMessage').value = '';
  closeReportForm();
  createNotification('Laporan berhasil dikirim. Terima kasih!', 'success');
}
function renderDevDashboard(){
  const wrap = document.getElementById('devDashboard');
  if(!wrap) return;
  wrap.style.display = 'block';
  const reports = getReports();
  wrap.innerHTML = `
    <div class="dev-header">
      <h2>Dashboard Developer</h2>
      <label class="dev-toggle"><input type="checkbox" ${isDevUser() ? 'checked' : ''} onchange="setDevUser(this.checked);if(!this.checked)document.getElementById('devDashboard').style.display='none'"> Mode Developer</label>
    </div>
    <div class="dev-stats">
      <span>Total laporan: <strong>${reports.length}</strong></span>
      <span>Pending: <strong>${reports.filter(r => r.status === 'pending').length}</strong></span>
    </div>
    <div class="dev-list">${reports.length === 0 ? '<p class="dev-empty">Belum ada laporan.</p>' : reports.map(function(r){
      return '<div class="dev-item"><div class="dev-item-head"><span class="dev-type dev-type-'+r.type+'">'+(r.type==='bug'?'Bug':r.type==='feature'?'Saran':'Lain')+'</span><span class="dev-date">'+new Date(r.date).toLocaleDateString('id-ID',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})+'</span></div><div class="dev-msg">'+escapeHtml(r.message)+'</div><div class="dev-meta">'+escapeHtml(r.username)+' &middot; '+escapeHtml(r.device||'').slice(0,80)+'...</div></div>';
    }).join('')}</div>`;
}
</script>
</body>
</html>
