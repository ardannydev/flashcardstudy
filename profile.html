<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profil akun FlashCardStudy.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1426">
<title>Profil — FlashCardStudy</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

  <header class="nh nh-nav-always">
    <div class="nh-inner">
      <div class="nh-bar">
        <a href="index.html" class="nh-logo">FlashCardStudy</a>
        <nav class="nh-nav-desktop">
          <div class="nh-skew-wrap">
            <a href="index.html" class="nh-link" draggable="false">Beranda</a>
            <a href="sets.html" class="nh-link" draggable="false">Set</a>
            <a href="create.html" class="nh-link" draggable="false">Buat</a>
            <span class="nh-nav-dot" id="navDot"></span>
          </div>
        </nav>
        <div class="nh-actions">
          <a href="profile.html" class="nh-profile-btn" draggable="false" aria-label="Profil">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="profile-wrap">
    <div class="profile-card">
      <div class="profile-avatar" id="profileAvatar">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <h1 class="profile-name" id="profileName">—</h1>
      <p class="profile-joined" id="profileJoined">Terdaftar: —</p>
    </div>

    <div class="profile-stats">
      <div class="profile-stat">
        <span class="profile-stat-num" id="statSets">0</span>
        <span class="profile-stat-label">Set</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="statCards">0</span>
        <span class="profile-stat-label">Kartu</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="statMastered">0</span>
        <span class="profile-stat-label">Dikuasai</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="statLearning">0</span>
        <span class="profile-stat-label">Diproses</span>
      </div>
    </div>

    <div class="profile-actions">
      <button class="btn btn-outline" onclick="logout()">Keluar</button>
    </div>
  </main>

  <footer class="site-footer">
    <p>FlashCardStudy &mdash; oleh <strong>Ardwanny</strong></p>
  </footer>

  <script src="app.js"></script>
<script>
(async function(){
  if(!requireLogin()) return;
  await syncSetsFromServer();

  const username = getCurrentUser() || 'Pengguna';
  document.getElementById('profileName').textContent = username;

  // Get user creation date from server if possible
  try {
    const res = await apiFetch('/api/user');
    if(res.ok) {
      const data = await res.json();
      if(data.createdAt) {
        const d = new Date(data.createdAt);
        document.getElementById('profileJoined').textContent = 'Terdaftar: ' + d.toLocaleDateString('id-ID', { year:'numeric', month:'long', day:'numeric' });
      }
    }
  } catch(e) { /* server not available */ }

  // Calculate stats from local sets
  const sets = getSets();
  let totalCards = 0, mastered = 0, learning = 0;
  const now = Date.now();

  sets.forEach(set => {
    if(set.terms) {
      set.terms.forEach(term => {
        totalCards++;
        if(term._review) {
          if(term._review.due && term._review.due <= now) learning++;
          else if(term._review.reps >= 3) mastered++;
          else if(term._review.reps > 0) learning++;
        }
      });
    }
  });

  document.getElementById('statSets').textContent = sets.length;
  document.getElementById('statCards').textContent = totalCards;
  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statLearning').textContent = learning;
})();
</script>
<script>
if(sessionStorage.getItem('navInternal')){
  document.querySelector('.nh').classList.add('nh-no-anim');
  sessionStorage.removeItem('navInternal');
}
</script>
</body>
</html>
