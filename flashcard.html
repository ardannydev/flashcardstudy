<body class="dark-theme flashcard-page">

  <div class="fc-sidenav" id="fcSidenav">

  <div class="qcontainer">

  <main class="qwrap" id="app">
    <div class="qtitle-bar">
      <span class="qtitle-bar-label" id="titleLabel">Judul</span>
      <div class="qbadge qbadge-learning" id="learningBadge" style="display:none"><span class="qbadge-count" id="learningCount">0</span> Masih dipelajari</div>
      <span class="qtitle-bar-text" id="setTitle"></span>
      <div class="qbadge qbadge-know" id="knowBadge" style="display:none">Tahu <span class="qbadge-count" id="knowCount">0</span></div>
      <button class="qtitle-star-filter" id="starFilterBtn" data-title="Tinjau kartu bintang"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Bookmark</button>
    </div>
    <div class="qslide" id="slideWrap">
    <div class="qscene">
      <div class="qflip3d" id="flipInner" role="button" tabindex="0" aria-label="Kartu. Tekan spasi untuk membalik.">

        <!-- tumpukan kartu latar belakang (poker stack) -->
        <div class="qcard-shell qcard-bg qcard-bg-2" id="cardBg2">
          <div class="qcard-body"><div class="qtext"></div></div>
        </div>
        <div class="qcard-shell qcard-bg qcard-bg-1" id="cardBg1">
          <div class="qcard-body"><div class="qtext"></div></div>
        </div>

        <!-- sisi depan: kotoba -->
        <div class="qcard-shell qshell-front" id="cardFront">
          <div class="qcard-top">
            <span class="qside-label">Depan</span>
            <div class="qicons">
              <button class="qstar" id="starBtnFront" title="Tandai" aria-label="Tandai bintang" aria-pressed="false">★</button>
            </div>
          </div>
          <div class="qcard-body"><div class="qtext" id="cardTextFront"></div></div>
          <div class="qflipbar">Klik kartu untuk membalik</div>
        </div>

        <!-- sisi belakang: arti -->
        <div class="qcard-shell qshell-back">
          <div class="qcard-top">
            <span class="qside-label">Belakang</span>
            <div class="qicons">
              <button class="qstar" id="starBtnBack" title="Tandai" aria-label="Tandai bintang" aria-pressed="false">★</button>
            </div>
          </div>
          <div class="qcard-body"><div class="qtext" id="cardTextBack"></div></div>
          <div class="qflipbar">Klik kartu untuk membalik</div>
        </div>

      </div>
    </div>
    </div>

    <!-- Completion results screen (hidden by default) -->
    <div class="qresults" id="resultsScreen" style="display:none">
      <div class="qresults-card">
        <div class="qresults-header">
          <div class="qresults-ring">
            <svg class="qresults-svg" viewBox="0 0 120 120">
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00D9FF"/>
                  <stop offset="100%" stop-color="#8B5CF6"/>
                </linearGradient>
              </defs>
              <circle class="qresults-ring-bg" cx="60" cy="60" r="52" />
              <circle class="qresults-ring-fill" id="resultsRingFill" cx="60" cy="60" r="52" stroke="url(#ringGrad)" />
            </svg>
            <span class="qresults-pct" id="resultsPct">0%</span>
          </div>
          <h2 class="qresults-title" id="resultsTitle">Luar biasa!</h2>
        </div>
        <div class="qresults-stats">
          <div class="qresults-stat qresults-stat-know">
            <span class="qresults-stat-icon">✓</span>
            <span class="qresults-stat-num" id="resultsKnow">0</span>
            <span class="qresults-stat-label">Tahu</span>
          </div>
          <div class="qresults-stat qresults-stat-learn">
            <span class="qresults-stat-icon">↻</span>
            <span class="qresults-stat-num" id="resultsLearn">0</span>
            <span class="qresults-stat-label">Belajar</span>
          </div>
          <div class="qresults-stat qresults-stat-left">
            <span class="qresults-stat-icon">◉</span>
            <span class="qresults-stat-num" id="resultsLeft">0</span>
            <span class="qresults-stat-label">Sisa</span>
          </div>
        </div>
        <div class="qresults-next">
          <button class="qresults-btn qresults-btn-primary" id="resultsBtnPractice">Latihan soal</button>
          <button class="qresults-btn qresults-btn-secondary" id="resultsBtnLearn">Pelajari <span id="resultsLearnBtnCount">0</span></button>
          <button class="qresults-btn qresults-btn-ghost" id="resultsBtnRestart">Ulangi flashcard</button>
          <a href="#" class="qresults-back" id="resultsBackLink">← Kembali</a>
        </div>
      </div>
    </div>
    <div class="qbottom-panel">
    <div class="qbottom-bar">
      <span class="qbottom-bar-left">Kartu</span>
      <span class="qbottom-bar-right"><span class="qnum" id="counter">1 / 1</span></span>
    </div>
    <div class="qbottom-progress"><div class="qbottom-progress-fill" id="progressFill"></div></div>
    <div class="qbottom" id="qbottom">
      <div class="qtoggle-wrap">
        <span class="qtoggle-tt" id="toggleTooltip" data-title="Aktifkan pantau kemajuan">
          <button class="qtoggle" id="progressToggle" role="switch" aria-checked="false" aria-label="Pantau kemajuan">
            <svg class="qtoggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </span>
        <button class="qinfo-btn" id="infoBtn" data-title="Lihat bantuan" aria-label="Info set">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
      </div>

      <div class="qnav-center" id="navArrows">
        <button class="qarrow" id="prevBtn" data-title="Sebelumnya"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <button class="qarrow" id="nextBtn" data-title="Selanjutnya"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      <div class="qnav-center" id="navTrack" style="display:none">
        <button class="qarrow qx" id="xBtn" data-title="Masih dipelajari"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        <button class="qarrow qcheck" id="checkBtn" data-title="Tahu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></button>
      </div>

      <div class="qright-tools">
        <button class="qplay" id="restartBtn" data-title="Putar otomatis"><svg class="qplay-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg><svg class="qpause-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <button class="qplay" id="undoBtn" data-title="Batalkan" style="display:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h13a4 4 0 010 8H10"/><path d="M7 6l-4 4 4 4"/></svg></button>
        <button class="qshuffle" id="shuffleBtn" data-title="Acak"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></button>
      </div>
    </div>
  </div>

    <script src="app.js"></script>
<script>
(function(){
const setId = qs('id');
const set = getSet(setId);

if(!set || !set.terms.length){
  document.getElementById('app').innerHTML =
    '<div class="empty" style="color:#cfd3ec"><h2 style="color:#fff">Set tidak ditemukan</h2><p>Set ini kosong atau sudah dihapus.</p><a class="btn btn-primary" href="index.html" style="display:inline-block;margin-top:12px">Kembali ke beranda</a></div>';
  document.getElementById('slideWrap').style.display = 'none';
  document.getElementById('qbottom').style.display = 'none';
  return;
}

document.getElementById('setTitle').textContent = set.title.toUpperCase();

let order = set.terms.map(t => t.id);
let starred = new Set(JSON.parse(localStorage.getItem('qz_starred_' + setId) || '[]'));
function saveStarred(){ localStorage.setItem('qz_starred_' + setId, JSON.stringify([...starred])); }
let idx = 0;
let flipped = false;
let trackProgress = false;
let flipStep = 0; // selalu bertambah, arah putaran selalu sama (ke atas), tidak pernah mundur

let learningCount = 0;
let knowCount = 0;
let history = []; // {idx, action:'learning'|'know'}
let swipedIds = new Set(); // kartu yang sudah di-swipe di mode ON
let dragging = false;
let dragStartX = 0;
let dragStartY = 0;
let dragX = 0;
let dragY = 0;
let suppressClick = false;
const DRAG_THRESHOLD = 80;
let autoPlayTimer = null;

const savedResults = JSON.parse(sessionStorage.getItem('qz_results'));
if(savedResults && savedResults.total === set.terms.length){
  knowCount = savedResults.knowCount;
  learningCount = savedResults.learningCount;
  showResults();
}

function currentTerm(){
  const id = order[idx];
  return set.terms.find(t => t.id === id);
}

function render(){
  const t = currentTerm();
  document.getElementById('cardTextFront').textContent = t.term;
  document.getElementById('cardTextBack').textContent = t.def;
  document.getElementById('counter').textContent = `${idx+1} / ${order.length}`;
  document.getElementById('progressFill').style.width = `${((idx+1)/order.length)*100}%`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === order.length - 1;

  // show star filter button (always visible except in track progress mode)
  document.getElementById('starFilterBtn').style.display = !trackProgress ? 'flex' : 'none';
  document.getElementById('titleLabel').style.display = trackProgress ? 'none' : 'block';
  document.getElementById('learningBadge').style.display = trackProgress ? 'inline-flex' : 'none';
  document.getElementById('knowBadge').style.display = trackProgress ? 'inline-flex' : 'none';

  // poker stack: show/hide bg cards (always empty — plain card shapes)
  const bgIds = ['cardBg1','cardBg2'];
  const remaining = trackProgress ? Math.min(order.length - 1, 2) : 0;
  for(let i = 0; i < 2; i++){
    const el = document.getElementById(bgIds[i]);
    if(i < remaining) el.classList.remove('hide');
    else el.classList.add('hide');
  }

  const isStarred = starred.has(t.id);
  document.getElementById('starBtnFront').classList.toggle('active', isStarred);
  document.getElementById('starBtnBack').classList.toggle('active', isStarred);
  document.getElementById('starBtnFront').setAttribute('aria-pressed', isStarred);
  document.getElementById('starBtnBack').setAttribute('aria-pressed', isStarred);
}

function applyFlipRotation(){
  document.getElementById('flipInner').style.transform = `rotateX(${flipStep * 180}deg)`;
}
function applyTransform(){
  const front = document.getElementById('cardFront');
  if(trackProgress){
    front.style.transform = `translateX(${dragX}px) translateY(${dragY}px)`;
  } else {
    front.style.transform = `translateX(${dragX}px)`;
  }
}
function resetFrontTransform(){
  const front = document.getElementById('cardFront');
  if(front){
    front.style.transform = '';
    front.style.opacity = '';
  }
}
function hexToRgba(hex, alpha){
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function setShellGlow(color, intensity){
  document.querySelectorAll('.qshell-front, .qshell-back').forEach(el => {
    if(!color){
      el.style.borderColor = 'transparent';
      el.style.boxShadow = '0 20px 50px rgba(0,0,0,.35)';
      return;
    }
    const glowSize = Math.round(20 + intensity * 50);
    el.style.borderColor = hexToRgba(color, 0.3 + intensity * 0.7);
    el.style.boxShadow = `0 20px 50px rgba(0,0,0,.35), inset 0 0 ${Math.round(intensity * 30)}px ${hexToRgba(color, intensity * 0.3)}, 0 0 ${glowSize}px ${hexToRgba(color, 0.3 + intensity * 0.5)}`;
  });
}
function flip(){
  flipped = !flipped;
  flipStep++;
  applyFlipRotation();
  announce(flipped ? 'Menampilkan arti' : 'Menampilkan istilah');
}
function resetToFront(){
  if(flipped){
    flipStep++;
    flipped = false;
  }
  applyFlipRotation();
  resetFrontTransform();
}

function updateBadges(){
  document.getElementById('learningCount').textContent = learningCount;
  document.getElementById('knowCount').textContent = knowCount;
}
function bumpBadge(type){
  const badge = document.getElementById(type === 'learning' ? 'learningBadge' : 'knowBadge');
  const countSpan = document.getElementById(type === 'learning' ? 'learningCount' : 'knowCount');
  badge.classList.add('qbump');
  countSpan.textContent = '+1';
  setTimeout(() => {
    updateBadges();
    badge.classList.remove('qbump');
  }, 500);
}

function animateSwipeTransition(exitX, exitY, onMidpoint){
  const front = document.getElementById('cardFront');
  const flip = document.getElementById('flipInner');
  flip.classList.add('swiping');
  front.style.transition = 'transform .35s ease, opacity .35s ease';
  front.style.opacity = '0';
  front.style.transform = `translateX(${exitX}px) translateY(${exitY}px) rotateZ(${exitX/20}deg)`;

  setTimeout(() => {
    onMidpoint();
    if(flipStep % 2 !== 0) flipStep++;
    flipped = false;
    dragX = 0;
    dragY = 0;

    front.style.transition = 'none';
    front.style.transform = `translateX(0px) translateY(0px)`;
    front.style.opacity = '';
    setShellGlow(null, 0);
    applyFlipRotation();
    if(document.getElementById('resultsScreen').style.display === 'none') render();
    void front.offsetWidth;

    front.style.transition = 'transform .35s ease, opacity .35s ease';
    front.style.opacity = '1';
    setTimeout(() => {
      front.style.transition = '';
      flip.classList.remove('swiping');
    }, 360);
  }, 350);
}

function animateNavTransition(dir, onMidpoint){
  const front = document.getElementById('cardFront');
  front.style.transition = 'transform .25s ease-out, opacity .25s ease-out';
  front.style.opacity = '0';
  front.style.transform = `translateX(${dir*600}px)`;

  setTimeout(() => {
    onMidpoint();
    if(flipStep % 2 !== 0) flipStep++;
    flipped = false;
    dragX = 0;
    dragY = 0;

    front.style.transition = 'none';
    front.style.transform = `translateX(${-dir*600}px)`;
    applyFlipRotation();
    if(document.getElementById('resultsScreen').style.display === 'none') render();
    void front.offsetWidth;

    front.style.transition = 'transform .25s ease-out, opacity .25s ease-out';
    front.style.transform = 'translateX(0px)';
    front.style.opacity = '1';
    setTimeout(() => { front.style.transition = ''; }, 260);
  }, 250);
}

function commitSwipe(action){
  const color = action === 'know' ? '#4de6ac' : '#ff9a4d';
  setShellGlow(color, 1);
  const exitX = dragX > 0 ? 800 : -800;
  const exitY = dragY > 0 ? 800 : -800;
  const useX = Math.abs(dragX) >= Math.abs(dragY);
  animateSwipeTransition(useX ? exitX : 0, useX ? 0 : exitY, () => {
    history.push({idx, action});
    swipedIds.add(order[idx]);
    if(action === 'know'){ knowCount++; bumpBadge('know'); }
    else { learningCount++; bumpBadge('learning'); }
    announce(action === 'know' ? 'Ditandai: Tahu' : 'Ditandai: Masih dipelajari');
    if(trackProgress && swipedIds.size >= order.length){
      showResults();
      return;
    }
    idx = (idx + 1) % order.length;
  });
}

function commitNav(dir){
  if(dir < 0 && idx === 0) return snapBack();
  if(dir > 0 && idx === order.length - 1) return snapBack();
  animateNavTransition(dir, () => {
    if(dir < 0) idx--;
    else idx++;
  });
}

function snapBack(){
  const front = document.getElementById('cardFront');
  front.style.transition = 'transform .3s ease, opacity .3s ease';
  dragX = 0;
  dragY = 0;
  resetFrontTransform();
  setShellGlow(null, 0);
  setTimeout(() => { front.style.transition = ''; }, 310);
}

function showResults(){
  const total = order.length;
  const pct = total > 0 ? Math.round((knowCount / total) * 100) : 0;
  const remaining = total - knowCount - learningCount;

  document.getElementById('slideWrap').style.display = 'none';
  document.getElementById('resultsScreen').style.display = '';
  document.getElementById('resultsKnow').textContent = knowCount;
  document.getElementById('resultsLearn').textContent = learningCount;
  document.getElementById('resultsLeft').textContent = remaining;
  document.getElementById('resultsLearnBtnCount').textContent = learningCount;
  document.getElementById('resultsPct').textContent = pct + '%';

  // animate ring fill
  const circumference = 2 * Math.PI * 52;
  const fill = document.getElementById('resultsRingFill');
  fill.style.strokeDasharray = circumference;
  fill.style.strokeDashoffset = circumference;
  requestAnimationFrame(() => {
    fill.style.transition = 'stroke-dashoffset 1s ease';
    fill.style.strokeDashoffset = circumference - (pct / 100) * circumference;
  });

  // hide bottom bar controls, show only results
  document.getElementById('navTrack').style.display = 'none';
  document.getElementById('navArrows').style.display = 'none';
  document.getElementById('undoBtn').style.display = 'none';
  document.getElementById('shuffleBtn').style.display = 'none';
  document.getElementById('restartBtn').style.display = 'none';

  document.getElementById('counter').textContent = `Selesai`;
  document.getElementById('progressFill').style.width = '100%';

  // hide track badges, show title & bookmark
  document.getElementById('learningBadge').style.display = 'none';
  document.getElementById('knowBadge').style.display = 'none';
  document.getElementById('titleLabel').style.display = 'block';
  document.getElementById('starFilterBtn').style.display = 'flex';
  document.querySelector('.qtoggle-wrap').style.display = 'none';
  trackProgress = false;
  sessionStorage.setItem('qz_results', JSON.stringify({ knowCount, learningCount, total }));
}

function hideResults(){
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('slideWrap').style.display = '';
  document.getElementById('navTrack').style.display = trackProgress ? 'flex' : 'none';
  document.getElementById('navArrows').style.display = trackProgress ? 'none' : 'flex';
  document.getElementById('undoBtn').style.display = trackProgress ? 'flex' : 'none';
  document.getElementById('shuffleBtn').style.display = '';
  document.getElementById('restartBtn').style.display = trackProgress ? 'none' : 'flex';

  // restore title/star/badge visibility based on track mode
  document.getElementById('titleLabel').style.display = trackProgress ? 'none' : 'block';
  document.getElementById('starFilterBtn').style.display = trackProgress ? 'none' : 'flex';
  if(trackProgress){
    document.getElementById('learningBadge').style.display = 'inline-flex';
    document.getElementById('knowBadge').style.display = 'inline-flex';
  } else {
    document.getElementById('learningBadge').style.display = 'none';
    document.getElementById('knowBadge').style.display = 'none';
  }
  document.getElementById('progressToggle').disabled = false;
  document.querySelector('.qtoggle-wrap').style.display = '';
  document.getElementById('progressToggle').classList.toggle('on', trackProgress);
  document.getElementById('progressToggle').setAttribute('aria-checked', trackProgress);
  document.getElementById('toggleTooltip').dataset.title = trackProgress ? 'Nonaktifkan pantau kemajuan' : 'Aktifkan pantau kemajuan';
  sessionStorage.removeItem('qz_results');
}
function goTo(newIdx){
  if(newIdx < 0 || newIdx >= order.length) return;
  const goingNext = newIdx > idx;
  const wrap = document.getElementById('slideWrap');

  // 1) kartu (kotoba + arti) lama geser keluar ke arah tujuan
  wrap.classList.remove('qslide-hidden-left','qslide-hidden-right');
  wrap.classList.add(goingNext ? 'qslide-hidden-left' : 'qslide-hidden-right');

  setTimeout(() => {
    idx = newIdx;
    resetToFront();
    render();

    // 2) tempatkan kartu baru di sisi berlawanan tanpa transisi (instan)
    wrap.style.transition = 'none';
    wrap.classList.remove('qslide-hidden-left','qslide-hidden-right');
    wrap.classList.add(goingNext ? 'qslide-hidden-right' : 'qslide-hidden-left');
    void wrap.offsetWidth; // paksa reflow

    // 3) lalu geser masuk ke tengah dengan transisi normal
    wrap.style.transition = '';
    wrap.classList.remove('qslide-hidden-left','qslide-hidden-right');
  }, 220);
}
function toggleStar(e){
  e.stopPropagation();
  e.preventDefault();
  const id = currentTerm().id;
  starred.has(id) ? starred.delete(id) : starred.add(id);
  saveStarred();
  render();
}

document.getElementById('flipInner').addEventListener('pointerdown', (e) => {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  const el = document.getElementById('flipInner');
  el.classList.add('dragging');
  el.setPointerCapture(e.pointerId);
});
document.getElementById('flipInner').addEventListener('pointermove', (e) => {
  if(!dragging) return;
  dragX = e.clientX - dragStartX;
  dragY = e.clientY - dragStartY;
  if(Math.abs(dragX) > 5 || Math.abs(dragY) > 5) suppressClick = true;
  applyTransform();
  if(trackProgress){
    const dist = Math.sqrt(dragX * dragX + dragY * dragY);
    const glowMax = Math.min(window.innerWidth, window.innerHeight) / 2.8;
    const intensity = Math.min(dist / glowMax, 1);
    if(Math.abs(dragX) > Math.abs(dragY)){
      if(dragX < -15) setShellGlow('#ff9a4d', intensity);
      else if(dragX > 15) setShellGlow('#4de6ac', intensity);
      else setShellGlow(null, 0);
    } else if(Math.abs(dragY) > 15){
      setShellGlow('#ffffff', intensity);
    } else {
      setShellGlow(null, 0);
    }
  }
});
document.getElementById('flipInner').addEventListener('pointerup', () => {
  if(!dragging) return;
  dragging = false;
  const el = document.getElementById('flipInner');
  el.classList.remove('dragging');
  if(trackProgress){
    if(Math.abs(dragY) > Math.abs(dragX)){
      snapBack();
    } else if(Math.abs(dragX) >= DRAG_THRESHOLD){
      const isKnow = dragX > 0;
      commitSwipe(isKnow ? 'know' : 'learning');
    } else snapBack();
  } else {
    if(dragX <= -DRAG_THRESHOLD) commitNav(-1);
    else if(dragX >= DRAG_THRESHOLD) commitNav(1);
    else snapBack();
  }
});
document.getElementById('flipInner').addEventListener('click', () => {
  if(suppressClick){ suppressClick = false; return; }
  flip();
});
// keyboard support for the flip area (Enter / Space)
const flipEl = document.getElementById('flipInner');
if(flipEl){
  flipEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); flip(); }
  });
}

document.getElementById('prevBtn').addEventListener('click', () => goTo(idx-1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(idx+1));
document.getElementById('xBtn').addEventListener('click', () => commitSwipe('learning'));
document.getElementById('checkBtn').addEventListener('click', () => commitSwipe('know'));
document.getElementById('undoBtn').addEventListener('click', () => {
  const last = history.pop();
  if(!last) return;
  if(last.action === 'know') knowCount = Math.max(0, knowCount-1);
  else learningCount = Math.max(0, learningCount-1);
  updateBadges();
  idx = last.idx;
  flipped = false;
  dragX = 0;
  dragY = 0;
  applyFlipRotation();
  resetFrontTransform();
  render();
});
function stopStarPointer(e){
  e.stopPropagation();
}

document.getElementById('starBtnFront').addEventListener('pointerdown', stopStarPointer);
document.getElementById('starBtnFront').addEventListener('click', toggleStar);
document.getElementById('starBtnBack').addEventListener('pointerdown', stopStarPointer);
document.getElementById('starBtnBack').addEventListener('click', toggleStar);
document.getElementById('shuffleBtn').addEventListener('click', () => {
  order = shuffle(order);
  idx = 0;
  resetToFront();
  render();
});
document.getElementById('starFilterBtn').addEventListener('click', () => {
  const btn = document.getElementById('starFilterBtn');
  if(order.length === set.terms.length){
    order = set.terms.filter(t => starred.has(t.id)).map(t => t.id);
    if(order.length === 0){ order = set.terms.map(t => t.id); createNotification('Belum ada kartu berbintang','info',2000); return; }
    btn.classList.add('active');
  } else {
    order = set.terms.map(t => t.id);
    btn.classList.remove('active');
  }
  idx = 0;
  resetToFront();
  render();
});
document.getElementById('restartBtn').addEventListener('click', () => {
  if(!trackProgress){
    if(autoPlayTimer){
      clearInterval(autoPlayTimer);
      autoPlayTimer = null;
      document.getElementById('restartBtn').querySelector('.qplay-icon').style.display = '';
      document.getElementById('restartBtn').querySelector('.qpause-icon').style.display = 'none';
      return;
    }
    document.getElementById('restartBtn').querySelector('.qplay-icon').style.display = 'none';
    document.getElementById('restartBtn').querySelector('.qpause-icon').style.display = '';
    autoPlayTimer = setInterval(() => {
      if(idx < order.length - 1){
        commitNav(1);
      } else {
        idx = 0;
        resetToFront();
        render();
      }
    }, 3000);
    return;
  }
  order = set.terms.map(t => t.id);
  idx = 0;
  resetToFront();
  render();
});
document.getElementById('progressToggle').addEventListener('click', function(){
  if(document.getElementById('resultsScreen').style.display !== 'none') return;
  trackProgress = !trackProgress;
  this.classList.toggle('on', trackProgress);
  this.setAttribute('aria-checked', trackProgress);
  document.getElementById('toggleTooltip').dataset.title = trackProgress ? 'Nonaktifkan pantau kemajuan' : 'Aktifkan pantau kemajuan';
  document.getElementById('navArrows').style.display = trackProgress ? 'none' : 'flex';
  document.getElementById('navTrack').style.display = trackProgress ? 'flex' : 'none';
  document.getElementById('restartBtn').style.display = trackProgress ? 'none' : 'flex';
  document.getElementById('undoBtn').style.display = trackProgress ? 'flex' : 'none';
  document.getElementById('titleLabel').style.display = trackProgress ? 'none' : 'block';
  document.getElementById('starFilterBtn').style.display = trackProgress ? 'none' : 'flex';
  document.getElementById('learningBadge').style.display = trackProgress ? 'inline-flex' : 'none';
  document.getElementById('knowBadge').style.display = trackProgress ? 'inline-flex' : 'none';
  if(autoPlayTimer){
    clearInterval(autoPlayTimer);
    autoPlayTimer = null;
    document.getElementById('restartBtn').querySelector('.qplay-icon').style.display = '';
    document.getElementById('restartBtn').querySelector('.qpause-icon').style.display = 'none';
  }
  if(trackProgress){
    learningCount = 0; knowCount = 0; history = []; swipedIds.clear();
    updateBadges();
  }
  render();
});

document.getElementById('resultsBtnRestart').addEventListener('click', () => {
  swipedIds.clear();
  learningCount = 0;
  knowCount = 0;
  history = [];
  updateBadges();
  trackProgress = true;
  const tog = document.getElementById('progressToggle');
  tog.disabled = false;
  tog.classList.add('on');
  tog.setAttribute('aria-checked', 'true');
  tog.parentElement.dataset.title = 'Nonaktifkan pantau kemajuan';
  hideResults();
  idx = 0;
  resetToFront();
  render();
});
document.getElementById('resultsBtnLearn').addEventListener('click', () => {
  const learnIds = history.filter(h => h.action === 'learning').map(h => order[h.idx]);
  if(learnIds.length === 0){
    trackProgress = true;
    const tog = document.getElementById('progressToggle');
    tog.disabled = false; tog.classList.add('on'); tog.setAttribute('aria-checked', 'true'); tog.parentElement.dataset.title = 'Nonaktifkan pantau kemajuan';
    hideResults(); idx = 0; resetToFront(); render();
    return;
  }
  order = learnIds;
  swipedIds.clear();
  learningCount = 0;
  knowCount = 0;
  history = [];
  updateBadges();
  trackProgress = true;
  const tog = document.getElementById('progressToggle');
  tog.disabled = false;
  tog.classList.add('on');
  tog.setAttribute('aria-checked', 'true');
  tog.parentElement.dataset.title = 'Nonaktifkan pantau kemajuan';
  hideResults();
  idx = 0;
  resetToFront();
  render();
});
document.getElementById('resultsBtnPractice').addEventListener('click', () => {
  const setId = qs('id');
  navigateTo('learn.html?id=' + setId);
});
document.getElementById('resultsBackLink').addEventListener('click', (e) => {
  e.preventDefault();
  navigateTo('sets.html');
});

document.getElementById('infoBtn').addEventListener('click', function(){
  document.body.classList.toggle('show-titles');
  document.getElementById('fcSidenav').classList.toggle('expanded');
});

document.addEventListener('keydown', (e) => {
  const resultsVisible = document.getElementById('resultsScreen').style.display !== 'none';
  if(resultsVisible){
    if(e.code === 'Escape'){
      swipedIds.clear();
      learningCount = 0;
      knowCount = 0;
      history = [];
      updateBadges();
      hideResults();
      idx = 0;
      resetToFront();
      render();
    }
    return;
  }
  if(e.code === 'Space'){ e.preventDefault(); flip(); }
  else if(e.code === 'ArrowRight'){ goTo(idx+1); }
  else if(e.code === 'ArrowLeft'){ goTo(idx-1); }
});

  // Render avatar profil di sidebar
  function renderFcNavAvatar(){
    const avatarEl = document.getElementById('fcNavAvatar');
    if(avatarEl && typeof getUserAvatarUrl === 'function'){
      avatarEl.innerHTML = `<img src="${getUserAvatarUrl()}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;">`;
    }
  }
  renderFcNavAvatar();

render();
})();

// Nav helpers
function navigate(e,el){
  var href = el.getAttribute('href');
  if(!href||href.startsWith('#')) return;
  e.preventDefault();
  sessionStorage.setItem('navInternal','1');
  navigateTo(href);
}
function toggleNav(e){
  if(e) e.preventDefault();
  document.getElementById('fcSidenav').classList.toggle('expanded');
}
function navClick(e,el){
  var nav = document.getElementById('fcSidenav');
  if(!nav.classList.contains('expanded')){
    e.preventDefault();
    nav.classList.add('expanded');
  } else {
    navigate(e,el);
  }
}
document.addEventListener('click',function(e){
  var nav = document.getElementById('fcSidenav');
  if(nav.classList.contains('expanded') && !nav.contains(e.target)){
    nav.classList.remove('expanded');
  }
});
if(sessionStorage.getItem('navInternal')){
  sessionStorage.removeItem('navInternal');
}
</script>
