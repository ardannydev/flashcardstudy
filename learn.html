<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Mode kuis pilihan ganda untuk belajar kosakata dengan FlashCardStudy.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0b2e">
<title>Pelajari — FlashCardStudy</title>
<link rel="stylesheet" href="style.css">
<!-- dark theme CSS moved to style.css -->

</head>
<body class="dark-theme">
  <header class="nh nh-learn">
    <div class="nh-inner">
      <div class="nh-bar">
        <a href="index.html" class="nh-logo">FlashCardStudy</a>
        <nav class="nh-nav-desktop">
          <div class="nh-skew-wrap">
            <a href="index.html" class="nh-link">Beranda</a>
            <a href="sets.html" class="nh-link">Set</a>
            <a href="create.html" class="nh-link">Buat</a>
          </div>
        </nav>
        <div class="nh-actions">
          <a href="profile.html" class="nh-profile-btn" aria-label="Profil">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </a>
        </div>
      </div>

    </div>
  </header>

  <main class="icontainer" id="app">
    <div class="seg-wrap">
      <div class="seg-left"><span id="segLeftCount">0</span><span class="seg-label">Benar</span></div>
      <div class="seg-line-container" id="segLineContainer"></div>
      <div class="seg-right"><span id="segRightCount">0</span><span class="seg-label">Total</span></div>
    </div>

    <div id="quizArea"></div>
  </main>

<script src="app.js"></script>
<script>
(async function(){
if(!requireLogin()) return;
await syncSetsFromServer();

const setId = qs('id');
const set = getSet(setId);

if(!set || set.terms.length < 2){
  document.getElementById('app').innerHTML =
    '<div class="empty"><h2>Butuh minimal 2 kotoba</h2><p>Tambahkan lebih banyak kotoba ke set ini untuk memakai mode Pelajari.</p><a class="btn btn-primary" href="index.html" style="display:inline-block;margin-top:12px">Kembali ke beranda</a></div>';
  throw new Error('not enough terms');
}

// Pre-load voices for TTS
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
}

function speakText(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    
    // Detect if text has Japanese characters
    const hasJapanese = /[\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\uff00-\uff9f\u4e00-\u9faf\u3400-\u4dbf]/.test(text);
    if (hasJapanese) {
      utterance.lang = 'ja-JP';
      const voices = window.speechSynthesis.getVoices();
      const jaVoice = voices.find(v => v.lang.startsWith('ja'));
      if (jaVoice) utterance.voice = jaVoice;
    } else {
      utterance.lang = 'id-ID';
      const voices = window.speechSynthesis.getVoices();
      const idVoice = voices.find(v => v.lang.startsWith('id'));
      if (idVoice) utterance.voice = idVoice;
    }
    
    window.speechSynthesis.speak(utterance);
  }
}

const SESSION_KEY = 'qz_learn_session_' + setId;
let queue = [];
let qIndex = 0;
let correctCount = 0;
let missed = [];
let answered = false;

function getQuizTerms() {
  const now = Date.now();
  set.terms.forEach(t => { try { ensureReviewMeta(t); } catch (e) {} });

  const due = set.terms.filter(t => t._review && t._review.due <= now);
  const notDue = set.terms.filter(t => !(t._review && t._review.due <= now));

  const dueShuffled = shuffle(due);
  const notDueShuffled = shuffle(notDue);

  return [...dueShuffled, ...notDueShuffled];
}

function renderProgressBar() {
  const container = document.getElementById('segLineContainer');
  if (!container) return;
  container.innerHTML = '';
  const total = queue.length || 1;
  const pct = Math.round((qIndex / total) * 100);
  const bar = document.createElement('div');
  bar.className = 'seg-line';
  const fill = document.createElement('div');
  fill.className = 'seg-fill';
  fill.id = 'segFill1';
  fill.style.width = pct + '%';
  bar.appendChild(fill);
  container.appendChild(bar);
}

function saveSessionState(data){
  try{ localStorage.setItem(SESSION_KEY, JSON.stringify(data)); }catch(e){}
}
function loadSessionState(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }catch(e){ return null; }
}
function clearSessionState(){
  try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
}

function startQuiz() {
  queue = getQuizTerms();
  qIndex = 0;
  correctCount = 0;
  missed = [];
  clearSessionState();
  renderQuestion();
}

function retryMissed(missedTerms) {
  queue = shuffle(missedTerms);
  qIndex = 0;
  correctCount = 0;
  missed = [];
  clearSessionState();
  renderQuestion();
}

function makeChoices(correctTerm){
  const others = set.terms.filter(t => t.id !== correctTerm.id);
  const distractors = shuffle(others).slice(0, Math.min(3, others.length));
  const choices = shuffle([correctTerm, ...distractors]);
  return choices;
}

function renderQuestion(){
  answered = false;
  const total = queue.length;

  // Update counters
  const segLeftCount = document.getElementById('segLeftCount');
  const segRightCount = document.getElementById('segRightCount');
  if(segLeftCount) segLeftCount.textContent = correctCount;
  if(segRightCount) segRightCount.textContent = total;

  renderProgressBar();

  if(qIndex >= total){
    renderSummary();
    return;
  }

  const current = queue[qIndex];
  const choices = makeChoices(current);
  const isTermToDef = (qIndex % 2 === 0);

  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="question-card">
      <div class="question-box">
        <div class="question-eyebrow">
          <span>${isTermToDef ? 'Istilah' : 'Definisi'}</span>
          <button class="speaker-btn" id="speakBtn" title="Dengarkan pelafalan" aria-label="Dengarkan pelafalan">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
          </button>
        </div>
        <div class="question-term">
          ${escapeHtml(isTermToDef ? current.term : current.def)}
        </div>
        <div class="question-prompt">Pilih jawaban yang tepat</div>
      </div>

      <div class="choices" id="choicesWrap"></div>

      <div class="question-footer">
        <button type="button" class="dont-know" id="dontKnowBtn">Tidak tahu jawabannya?</button>
      </div>
    </div>
    <div class="question-next-wrap">
      <button class="btn btn-primary" id="nextQBtn" style="display:none">Lanjutkan</button>
    </div>
  `;

  // Speaker button click listener
  document.getElementById('speakBtn').addEventListener('click', (e) => {
    e.preventDefault();
    speakText(isTermToDef ? current.term : current.def);
  });

  // Don't know click listener
  document.getElementById('dontKnowBtn').addEventListener('click', (e) => {
    e.preventDefault();
    if (answered) return;
    const btn = e.currentTarget;
    btn.classList.remove('pulse');
    void btn.offsetWidth;
    btn.classList.add('pulse');
    
    answered = true;
    document.querySelectorAll('.choice').forEach(el => {
      el.classList.add('disabled');
      if(el.dataset.id === current.id) {
        el.classList.add('correct');
      }
    });
    missed.push(current);
      const promptEl = area.querySelector('.question-prompt');
      if(promptEl) promptEl.outerHTML = '<div class="question-wrong-msg">Gak apa-apa, Anda masih belajar!</div>';
      const nextBtn = document.getElementById('nextQBtn');
      nextBtn.style.display = 'inline-block';
      nextBtn.classList.add('show');
      nextBtn.textContent = 'Lanjutkan';
      nextBtn.onclick = () => {
      qIndex++;
      renderQuestion();
    };
  });

  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = choices.map((c,i) => `
    <button class="choice" data-id="${escapeHtml(c.id)}">
      <span class="choice-num">${i+1}</span>
      <span class="choice-text">${escapeHtml(isTermToDef ? c.def : c.term)}</span>
    </button>
  `).join('');

  wrap.querySelectorAll('.choice').forEach((btn, i) => {
    btn.addEventListener('click', () => handleAnswer(btn, current, choices));
  });

  // keep legacy progress fill in sync (hidden by CSS here)
  const pfill = document.getElementById('progressFill');
  if(pfill){ pfill.style.width = `${(qIndex/total)*100}%`; }
}

function handleAnswer(btn, current, choices){
  if(answered) return;
  answered = true;
  const chosenId = btn.dataset.id;
  const isCorrect = chosenId === current.id;

  document.querySelectorAll('.choice').forEach(el => {
    el.classList.add('disabled');
    if(el.dataset.id === current.id) el.classList.add('correct');
    else if(el === btn) el.classList.add('wrong');
  });

  if(isCorrect){
    correctCount++;
  } else {
    missed.push(current);
    const wrongMsgs = ['Hampir benar, Anda masih belajar!','Gak apa-apa, Anda masih belajar!','Belum tepat, coba lagi nanti!','Sabar ya, pasti bisa!','Keep going, belum nyampe!'];
    const promptEl = document.querySelector('.question-prompt');
    if(promptEl) promptEl.outerHTML = `<div class="question-wrong-msg">${wrongMsgs[Math.floor(Math.random()*wrongMsgs.length)]}</div>`;
  }

  // update ARIA states and announce result for screen readers
  document.querySelectorAll('.choice').forEach(el => {
    if (el.dataset.id === current.id) {
      el.setAttribute('aria-pressed', 'true');
    } else {
      el.setAttribute('aria-pressed', 'false');
    }
  });
  const isTermToDef = (qIndex % 2 === 0);
  announce(isCorrect ? 'Benar' : `Salah. Jawaban yang benar: ${isTermToDef ? current.def : current.term}`);

  // Update SM-2 metadata: quality 5 for correct, 2 for wrong
  try{
    updateReviewForTerm(set.id, current.id, isCorrect ? 5 : 2);
  }catch(e){ console.warn('SM2 update failed', e); }

  const nextBtn = document.getElementById('nextQBtn');

  if(isCorrect){
    const msgs = ['Benar!','Luar biasa!','Tepat sekali!','Keren!','Hebat!','Mantap!','Sempurna!','Asik benar!','Jago!','Nice!'];
    const promptEl = document.querySelector('.question-prompt');
    if(promptEl) promptEl.outerHTML = `<div class="question-correct-msg">${msgs[Math.floor(Math.random()*msgs.length)]}</div>`;
    setTimeout(() => { qIndex++; renderQuestion(); }, 800);
  } else {
    nextBtn.style.display = 'inline-block';
    nextBtn.classList.add('show');
    nextBtn.textContent = 'Lanjutkan';
    nextBtn.onclick = () => { qIndex++; renderQuestion(); };
  }
}

function renderSummary(){
  // save state so refresh stays on summary
  saveSessionState({ correctCount, total: queue.length, missedIds: missed.map(m => m.id) });

  const total = queue.length;
  const pct = Math.round((correctCount/total)*100);
  const area = document.getElementById('quizArea');
  const circumference = 2 * Math.PI * 58;
  const offset = circumference - (pct / 100) * circumference;
  const allCorrect = missed.length === 0;

  area.innerHTML = `
    <div class="learn-summary">
      <div class="summary-ring-wrap">
        <svg class="summary-ring-svg" viewBox="0 0 140 140">
          <circle class="summary-ring-track" cx="70" cy="70" r="58" />
          <circle class="summary-ring-fill" cx="70" cy="70" r="58"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference}"
            data-target="${offset}" />
        </svg>
        <div class="summary-ring-inner">
          <span class="summary-ring-pct">${pct}%</span>
          <span class="summary-ring-label">benar</span>
        </div>
      </div>

      <h2 class="summary-title">${allCorrect ? 'Semua Selesai!' : 'Selesai!'}</h2>
      <p class="summary-desc">${correctCount} dari ${total} jawaban benar.</p>

      <div class="summary-stats">
        <div class="summary-stat summary-stat-correct">
          <span class="summary-stat-num">${correctCount}</span>
          <span class="summary-stat-label">Benar</span>
        </div>
        <div class="summary-stat summary-stat-wrong">
          <span class="summary-stat-num">${missed.length}</span>
          <span class="summary-stat-label">Salah</span>
        </div>
        <div class="summary-stat summary-stat-total">
          <span class="summary-stat-num">${total}</span>
          <span class="summary-stat-label">Total</span>
        </div>
      </div>

      ${allCorrect ? `
        <div class="summary-congrats">Semua kata sudah dikuasai! Pertahankan!</div>
      ` : ''}

      <div class="learn-actions">
        ${missed.length > 0 ? '<button class="btn btn-primary summary-btn" id="retryMissedBtn">Ulangi yang salah</button>' : ''}
        <button class="btn btn-outline summary-btn" id="restartBtn">Mulai Ulang</button>
        <a class="btn btn-ghost summary-btn" href="index.html">Ke Beranda</a>
      </div>
    </div>
  `;

  // animate ring
  requestAnimationFrame(() => {
    const fill = document.querySelector('.summary-ring-fill');
    if(fill) fill.style.strokeDashoffset = fill.dataset.target;
  });

  if(missed.length > 0){
document.getElementById('retryMissedBtn').addEventListener('click', () => retryMissed(missed));
  }
  document.getElementById('restartBtn').addEventListener('click', () => startQuiz());
}

// detect if this is a refresh vs fresh navigation
const navEntries = performance.getEntriesByType('navigation');
const isRefresh = navEntries.length > 0 && navEntries[0].type === 'reload';

// restore summary state on refresh only
const saved = loadSessionState();
if(isRefresh && saved && saved.correctCount !== undefined){
  correctCount = saved.correctCount || 0;
  queue = getQuizTerms();
  qIndex = queue.length;
  missed = (saved.missedIds || []).map(id => set.terms.find(t => t.id === id)).filter(Boolean);
  renderSummary();
} else {
  clearSessionState();
  startQuiz();
}
})();
</script>
</body>
</html>
