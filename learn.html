<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelajari — FlashCardStudy</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- dark theme CSS moved to style.css -->

</head>
<body class="dark-theme">
  <header class="topbar">
    <a href="index.html" class="logo"><span class="dot"></span>FlashCardStudy</a>
    <div class="topbar-spacer"></div>
    <a href="index.html" class="btn btn-ghost">Kembali</a>
    <button type="button" class="btn btn-ghost" onclick="logout()">Keluar</button>
  </header>

  <main class="container" id="app">
    <div class="seg-wrap">
      <div class="seg-left">1</div>
      <div class="seg-line-container" id="segLineContainer" style="flex: 1; display: flex; gap: 8px;"></div>
      <div class="seg-right">0</div>
    </div>

    <div class="learn-head">
      <div class="study-title" id="setTitle"></div>
      <div id="sessionBadge" style="background: #232752; color: #9db4ff; font-weight: 700; font-size: 13px; padding: 6px 14px; border-radius: 99px; border: 1px solid #34306e; white-space: nowrap;">
        Sesi 1 dari 5 — Istilah → Definisi
      </div>
      <div class="progressbar" style="display:none;"><div class="progressbar-fill" id="progressFill"></div></div>
    </div>

    <div id="quizArea"></div>
  </main>

<script src="app.js"></script>
<script>
(async function(){
if(!requireLogin()) return;
await syncSetsFromServer();

const setId = qs('id');
const set = getSet(setId);

if(!set || set.terms.length < 2){
  document.getElementById('app').innerHTML =
    '<div class="empty"><h2>Butuh minimal 2 kotoba</h2><p>Tambahkan lebih banyak kotoba ke set ini untuk memakai mode Pelajari.</p><a class="btn btn-primary" href="index.html" style="display:inline-block;margin-top:12px">Kembali ke beranda</a></div>';
  throw new Error('not enough terms');
}

document.getElementById('setTitle').textContent = set.title;

// Pre-load voices for TTS
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
}

function speakText(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    
    // Detect if text has Japanese characters
    const hasJapanese = /[\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\uff00-\uff9f\u4e00-\u9faf\u3400-\u4dbf]/.test(text);
    if (hasJapanese) {
      utterance.lang = 'ja-JP';
      const voices = window.speechSynthesis.getVoices();
      const jaVoice = voices.find(v => v.lang.startsWith('ja'));
      if (jaVoice) utterance.voice = jaVoice;
    } else {
      utterance.lang = 'id-ID';
      const voices = window.speechSynthesis.getVoices();
      const idVoice = voices.find(v => v.lang.startsWith('id'));
      if (idVoice) utterance.voice = idVoice;
    }
    
    window.speechSynthesis.speak(utterance);
  }
}

// Accessibility: aria-live announcer for screen readers
function announce(text){
  let lr = document.getElementById('a11yLive');
  if(!lr){
    lr = document.createElement('div');
    lr.id = 'a11yLive';
    lr.setAttribute('aria-live','polite');
    lr.style.position = 'absolute';
    lr.style.left = '-9999px';
    document.body.appendChild(lr);
  }
  lr.textContent = text;
}

const ROUND_SIZE = 10;
const TOTAL_SESSIONS = Math.ceil(set.terms.length / ROUND_SIZE);
let currentSession = 1;
let totalCorrectCount = 0;
let queue = [];                // urutan soal ronde berjalan
let qIndex = 0;
let correctCount = 0;
let missed = [];
let answered = false;

function getSessionTerms(sessionNum) {
  // Prefer cards that are due (SM-2), then fill with new/not-due cards up to ROUND_SIZE.
  const now = Date.now();
  // Ensure review meta exists for all terms (helper from app.js)
  set.terms.forEach(t => { try { ensureReviewMeta(t); } catch (e) { /* ignore if helper missing */ } });

  const due = set.terms.filter(t => t._review && t._review.due <= now);
  const notDue = set.terms.filter(t => !(t._review && t._review.due <= now));

  const dueShuffled = shuffle(due);
  const notDueShuffled = shuffle(notDue);

  const selected = dueShuffled.slice(0, ROUND_SIZE);
  if (selected.length < ROUND_SIZE) {
    selected.push(...notDueShuffled.slice(0, ROUND_SIZE - selected.length));
  }
  return selected;
}

function renderProgressSegments() {
  const container = document.getElementById('segLineContainer');
  if (container) {
    container.innerHTML = '';
    for (let s = 1; s <= TOTAL_SESSIONS; s++) {
      const segLine = document.createElement('div');
      segLine.className = 'seg-line';
      
      const segFill = document.createElement('div');
      segFill.className = 'seg-fill';
      segFill.id = `segFill${s}`;
      
      segLine.appendChild(segFill);
      container.appendChild(segLine);
    }
  }
}

function startSession(sessionNum) {
  if (sessionNum === 1) {
    totalCorrectCount = 0;
  }
  currentSession = sessionNum;
  const isTermToDef = (currentSession % 2 !== 0);
  
  // Update session badge UI
  const badge = document.getElementById('sessionBadge');
  if (badge) {
    badge.textContent = `Sesi ${currentSession} dari ${TOTAL_SESSIONS} — ${isTermToDef ? 'Istilah → Definisi' : 'Definisi → Istilah'}`;
  }
  
  queue = getSessionTerms(currentSession);
  qIndex = 0;
  correctCount = 0;
  missed = [];
  renderQuestion();
}

function retryMissedSession(missedTerms) {
  queue = shuffle(missedTerms);
  qIndex = 0;
  correctCount = 0;
  missed = [];
  renderQuestion();
}

function makeChoices(correctTerm){
  const others = set.terms.filter(t => t.id !== correctTerm.id);
  const distractors = shuffle(others).slice(0, Math.min(3, others.length));
  const choices = shuffle([correctTerm, ...distractors]);
  return choices;
}

function renderQuestion(){
  answered = false;
  const total = queue.length;
  if (document.getElementById('progressFill')) {
    document.getElementById('progressFill').style.width = `${(correctCount/total)*100}%`;
  }

  // Update left circle with totalCorrectCount, right circle with set.terms.length
  const segLeft = document.querySelector('.seg-left');
  const segRight = document.querySelector('.seg-right');
  if(segLeft) segLeft.textContent = totalCorrectCount;
  if(segRight) segRight.textContent = set.terms.length;

  // Update segmented fills for sessions 1 to TOTAL_SESSIONS
  for (let s = 1; s <= TOTAL_SESSIONS; s++) {
    const fillEl = document.getElementById(`segFill${s}`);
    if (fillEl) {
      if (s < currentSession) {
        fillEl.style.width = '100%';
      } else if (s === currentSession) {
        fillEl.style.width = `${(correctCount / total) * 100}%`;
      } else {
        fillEl.style.width = '0%';
      }
    }
  }

  if(qIndex >= total){
    renderSummary();
    return;
  }

  const current = queue[qIndex];
  const choices = makeChoices(current);
  const isTermToDef = (currentSession % 2 !== 0);

  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="question-card">
      <div class="question-box">
        <div class="question-eyebrow">
          <span>${isTermToDef ? 'Istilah' : 'Definisi'}</span>
          <button class="speaker-btn" id="speakBtn" title="Dengarkan pelafalan" aria-label="Dengarkan pelafalan" style="background: none; border: none; color: #cfd3ec; cursor: pointer; padding: 0; display: inline-flex; align-items: center; font-size: 15px; vertical-align: middle;">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
          </button>
        </div>
        <div class="question-term" style="font-size: 28px; font-weight: 700; color: #fff; margin: 16px 0 24px;">
          ${escapeHtml(isTermToDef ? current.term : current.def)}
        </div>
        <div class="question-prompt" style="color: #9aa0c7; font-weight: 700; margin: 14px 0 10px;">Pilih jawaban yang tepat</div>
      </div>

      <div class="choices" id="choicesWrap"></div>

      <div class="question-footer">
        <span class="flag" style="font-size: 16px; margin-right: 2px;">⚐</span>
        <a class="dont-know" href="#">Tidak tahu jawabannya?</a>
      </div>

      <div style="display:flex;justify-content:center;margin-top:20px">
        <button class="btn btn-primary" id="nextQBtn" style="display:none">Lanjut →</button>
      </div>
    </div>
  `;

  // Speaker button click listener
  document.getElementById('speakBtn').addEventListener('click', (e) => {
    e.preventDefault();
    speakText(isTermToDef ? current.term : current.def);
  });

  // Don't know click listener
  const dontKnowLink = area.querySelector('.dont-know');
  if (dontKnowLink) {
    dontKnowLink.addEventListener('click', (e) => {
      e.preventDefault();
      if (answered) return;
      
      answered = true;
      document.querySelectorAll('.choice').forEach(el => {
        el.classList.add('disabled');
        if(el.dataset.id === current.id) {
          el.classList.add('correct');
        }
      });
      missed.push(current);
      document.getElementById('nextQBtn').style.display = 'inline-block';
      document.getElementById('nextQBtn').onclick = () => {
        qIndex++;
        renderQuestion();
      };
    });
  }

  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = choices.map((c,i) => `
    <button class="choice" data-id="${c.id}">
      <span class="choice-num">${i+1}</span>
      <span class="choice-text">${escapeHtml(isTermToDef ? c.def : c.term)}</span>
    </button>
  `).join('');

  wrap.querySelectorAll('.choice').forEach((btn, i) => {
    btn.addEventListener('click', () => handleAnswer(btn, current, choices));
    // accessibility attributes and keyboard support
    btn.setAttribute('aria-pressed','false');
    btn.setAttribute('role','button');
    btn.tabIndex = 0;
    btn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
    });
  });

  // keep legacy progress fill in sync (hidden by CSS here)
  const pfill = document.getElementById('progressFill');
  if(pfill){ pfill.style.width = `${(qIndex/total)*100}%`; }
}

function handleAnswer(btn, current, choices){
  if(answered) return;
  answered = true;
  const chosenId = btn.dataset.id;
  const isCorrect = chosenId === current.id;

  document.querySelectorAll('.choice').forEach(el => {
    el.classList.add('disabled');
    if(el.dataset.id === current.id) el.classList.add('correct');
    else if(el === btn) el.classList.add('wrong');
  });

  if(isCorrect){
    correctCount++;
    totalCorrectCount++;
    const segLeft = document.querySelector('.seg-left');
    if(segLeft) segLeft.textContent = totalCorrectCount;
  } else {
    missed.push(current);
  }

  // update ARIA states and announce result for screen readers
  document.querySelectorAll('.choice').forEach(el => {
    if (el.dataset.id === current.id) {
      el.setAttribute('aria-pressed', 'true');
    } else {
      el.setAttribute('aria-pressed', 'false');
    }
  });
  const isTermToDef = (currentSession % 2 !== 0);
  announce(isCorrect ? 'Benar' : `Salah. Jawaban yang benar: ${isTermToDef ? current.def : current.term}`);

  // Update SM-2 metadata: quality 5 for correct, 2 for wrong
  try{
    updateReviewForTerm(set.id, current.id, isCorrect ? 5 : 2);
  }catch(e){ console.warn('SM2 update failed', e); }

  document.getElementById('nextQBtn').style.display = 'inline-block';
  document.getElementById('nextQBtn').onclick = () => {
    qIndex++;
    renderQuestion();
  };
}

function renderSummary(){
  if (document.getElementById('progressFill')) {
    document.getElementById('progressFill').style.width = '100%';
  }
  
  // Update segmented progress fills to 100% for completed sessions
  for (let s = 1; s <= TOTAL_SESSIONS; s++) {
    const fillEl = document.getElementById(`segFill${s}`);
    if (fillEl) {
      if (s <= currentSession) {
        fillEl.style.width = '100%';
      } else {
        fillEl.style.width = '0%';
      }
    }
  }

  const total = queue.length;
  const pct = Math.round((correctCount/total)*100);
  const area = document.getElementById('quizArea');
  const isFinalSession = (currentSession === TOTAL_SESSIONS);

  area.innerHTML = `
    <div class="learn-summary" style="text-align: center; padding: 40px 20px;">
      <div class="score-circle" style="width: 130px; height: 130px; border-radius: 50%; border: 8px solid #6a5cff; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 28px; font-weight: 800; color: #ffffff;">${pct}%</div>
      <h2>Sesi ${currentSession} Selesai!</h2>
      <p class="page-sub" style="color: #9aa0c7; margin-bottom: 24px;">
        ${correctCount} dari ${total} jawaban benar. 
        ${missed.length === 0 
          ? 'Sempurna! Semua jawaban benar di sesi ini.' 
          : `${missed.length} kata masih perlu dilatih lagi.`}
      </p>
      
      ${isFinalSession && missed.length === 0 ? `
        <h3 style="color: #0fb07a; margin-bottom: 20px;">🎉 Selamat! Anda telah menyelesaikan seluruh ${TOTAL_SESSIONS} Sesi latihan!</h3>
      ` : ''}

      <div class="learn-actions" style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
        ${missed.length > 0 ? '<button class="btn btn-primary" id="retryMissedBtn">Ulangi yang salah</button>' : ''}
        
        ${isFinalSession 
          ? '<button class="btn btn-outline" id="restartSessionsBtn">Mulai Ulang Sesi 1</button>'
          : `<button class="btn btn-outline" id="nextSessionBtn" style="background: #6a5cff; color: #fff; border-color: #6a5cff;">Lanjut ke Sesi ${currentSession + 1} →</button>`
        }
        
        <a class="btn btn-ghost" href="index.html">Ke Beranda</a>
      </div>
    </div>
  `;

  if(missed.length > 0){
    document.getElementById('retryMissedBtn').addEventListener('click', () => retryMissedSession(missed));
  }
  
  if(isFinalSession){
    document.getElementById('restartSessionsBtn').addEventListener('click', () => startSession(1));
  } else {
    document.getElementById('nextSessionBtn').addEventListener('click', () => startSession(currentSession + 1));
  }
}

renderProgressSegments();
startSession(1);
})();
</script>
</body>
</html>
